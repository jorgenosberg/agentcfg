name: Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: build site
    runs-on: ubuntu-latest
    concurrency:
      group: pages-build
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
          cache: true

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          # The site's package.json (and its packageManager pin) lives in
          # docs/, not the repo root where the action looks by default.
          package_json_file: docs/package.json

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: docs/.nvmrc
          cache: pnpm
          cache-dependency-path: docs/pnpm-lock.yaml

      # Deliberately not path-filtered to docs/**: the CLI reference below is
      # generated from Go source, so a Go-only change (new flag, renamed
      # command) also changes the docs and must redeploy.
      - name: Generate CLI reference
        run: make gen-docs

      - name: Verify CLI reference is not stale
        run: make check-docs

      - name: Install site dependencies
        run: pnpm install --frozen-lockfile --dir docs

      - name: Build site
        run: pnpm --dir docs run build

      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: docs/dist

  deploy:
    name: deploy
    needs: build
    runs-on: ubuntu-latest
    concurrency:
      group: pages-deploy
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
        id: deployment
